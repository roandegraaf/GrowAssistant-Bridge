api:
  batch_size: 100
  connection_timeout: 300
  log_values: true
  poll_interval: 5
  retry_max_attempts: 5
  retry_max_backoff: 60
  retry_min_backoff: 1
  transmission_interval: 10
  url: http://192.168.1.231:8080
general:
  api_logs_dir: logs/api
  collection_interval: 10
  data_dir: data
  external_integrations_dir: external_integrations
  log_file: logs/app.log
  log_level: INFO
integrations:
  gpio:
    enabled: false
    pins:
      '0':
        direction: OUT
        initial: LOW
        name: pump_relay
        pin: 17
      '1':
        direction: OUT
        initial: LOW
        name: light_relay
        pin: 18
      '2':
        direction: IN
        name: temperature_sensor
        pin: 4
        pull_up_down: UP
  http:
    enabled: true
    endpoints:
      '0':
        headers: null
        interval: 300
        method: GET
        name: catfact
        url: https://catfact.ninja/fact
      '1':
        headers:
          Content-Type: application/json
        method: POST
        name: control_api
        url: https://api.example.com/control
  mqtt:
    broker: localhost
    client_id: growassistant
    enabled: true
    password: ''
    port: 1883
    topics:
      '0':
        name: sensors/temperature
        type: temperature
      '1':
        name: sensors/humidity
        type: humidity
      '2':
        name: sensors/water_level
        type: water_level
      '3':
        name: controls/pump
        type: pump
      '4':
        name: controls/light
        type: light
    username: ''
  sample:
    devices:
      '0':
        name: sample_temperature
        type: temperature
      '1':
        name: sample_humidity
        type: humidity
      '2':
        name: sample_light
        type: light
      '3':
        name: sample_pump
        type: pump
      '4':
        name: sample_light_switch
        type: light_switch
    enabled: true
    update_interval: 10
  serial:
    baudrate: 9600
    bytesize: 8
    enabled: false
    parity: N
    port: /dev/ttyUSB0
    stopbits: 1
    timeout: 1
queue:
  flush_interval: 300
  max_queue_size: 10000
  persistence_enabled: true
  persistence_file: data/queue.db
web:
  auth_enabled: true
  debug: false
  enabled: true
  host: 0.0.0.0
  password_hash: scrypt:32768:8:1$MYD1TlOc3yNFx3v3$1b8c51b8fad7032147973a8d2aea6b3327467076f1ca92deccb8439b5873c280e49926841d7b6f0f70a1c7f64c337095ce4dae65dd81c0b56cf63aec882b2417
  port: 5010
  secret_key: change-this-in-production
  ssl_cert: ''
  ssl_enabled: false
  ssl_key: ''
  username: admin
