# GrowAssistant Bridge Configuration Example
# Copy this file to config.yaml and customize for your environment
# IMPORTANT: Never commit config.yaml with real credentials to version control

api:
  batch_size: 100
  log_values: true
  mqtt_keepalive: 60  # MQTT keepalive interval in seconds
  retry_max_attempts: 5
  retry_max_backoff: 60
  retry_min_backoff: 1
  transmission_interval: 10
  url: http://localhost:3000  # GrowAssistant app base URL (HTTPS pairing bootstrap)

general:
  api_logs_dir: logs/api_values
  collection_interval: 10
  data_dir: data
  external_integrations_dir: external_integrations
  log_file: logs/app.log
  log_level: INFO

integrations:
  gpio:
    enabled: false
    pins:
      '0':
        direction: OUT
        initial: LOW
        name: pump_relay
        pin: 17
      '1':
        direction: OUT
        initial: LOW
        name: light_relay
        pin: 18
      '2':
        direction: IN
        name: temperature_sensor
        pin: 4
        pull_up_down: UP

  http:
    enabled: false
    endpoints:
      '0':
        headers: null
        interval: 300
        method: GET
        name: example_endpoint
        url: https://api.example.com/data

  mqtt:
    broker: localhost
    client_id: growassistant
    enabled: false
    password: ''  # Set your MQTT password
    port: 1883
    topics:
      '0':
        name: sensors/temperature
        type: temperature
      '1':
        name: sensors/humidity
        type: humidity
    username: ''  # Set your MQTT username

  esphome:
    enabled: false
    reconnect_interval: 10
    devices:
      tent_sensors:
        name: tent_sensors
        host: tent-sensors.local  # or the device's IP
        port: 6053
        encryption_key: ''  # base64 PSK from ESPHome `api.encryption.key`
        # password: ''      # only if you used the legacy api.password
        # Optional explicit entity mapping. Without this, sensors are auto-mapped
        # by their ESPHome `device_class` (temperature/humidity/pressure/...).
        # ESPHome's `device_class: moisture` is ambiguous (soil/leak/tank), so
        # soil moisture sensors must be mapped explicitly. The `soil_moisture`
        # type is automatically logged as SOIL_MOISTURE.
        entities:
          soil_moisture_1:
            type: soil_moisture
          soil_moisture_2:
            type: soil_moisture

  sample:
    devices:
      '0':
        name: sample_temperature
        type: temperature
      '1':
        name: sample_humidity
        type: humidity
    enabled: true  # Enable for testing without hardware
    update_interval: 10

  serial:
    baudrate: 9600
    bytesize: 8
    enabled: false
    parity: N
    port: /dev/ttyUSB0
    stopbits: 1
    timeout: 1

  camera:
    # WebRTC camera streaming brokered through a locally-supervised go2rtc
    # process. go2rtc is an EXTERNAL binary (not a pip dependency) — install it
    # separately (https://github.com/AlexxIT/go2rtc) and put it on PATH or set
    # go2rtc_binary to its full path. The bridge spawns/manages it and relays
    # SDP between the app and go2rtc; go2rtc is the actual WebRTC media peer.
    enabled: false
    go2rtc_binary: go2rtc      # path to, or name on PATH of, the go2rtc binary
    go2rtc_api_port: 1984      # go2rtc HTTP API port
    go2rtc_host: 127.0.0.1     # host go2rtc's API is reachable on
    cameras:
      - name: tent1            # entity_id becomes camera.tent1
        # Any go2rtc stream source string (ffmpeg:/rtsp:/exec:/...). Example
        # below is a self-contained test pattern (no real camera needed):
        source: "exec:ffmpeg -re -f lavfi -i testsrc=size=1280x720:rate=15 -f lavfi -i sine=frequency=1000 -c:v libx264 -preset ultrafast -tune zerolatency -pix_fmt yuv420p -profile:v baseline -g 30 -c:a aac -f rtsp {output}"

queue:
  flush_interval: 300
  max_queue_size: 10000
  persistence_enabled: true
  persistence_file: data/queue.db

web:
  auth_enabled: true
  debug: false
  enabled: true
  host: 127.0.0.1  # Use 0.0.0.0 to allow external access (configure firewall!)
  password_hash: ''  # Will be set on first setup via web interface
  port: 5000
  secret_key: ''  # Will be auto-generated on first run if empty
  ssl_cert: ''  # Path to SSL certificate for HTTPS
  ssl_enabled: false  # Enable HTTPS (recommended for production)
  ssl_key: ''  # Path to SSL private key
  username: admin
